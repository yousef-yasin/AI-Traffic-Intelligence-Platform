<!DOCTYPE html>
<html>
<head>
    <title>JRIP Road Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        h1 {
            padding: 15px;
            margin: 0;
            background: #111827;
            color: white;
        }

        #map {
            height: 90vh;
            width: 100%;
        }
    </style>
</head>

<body>

<h1>JRIP Smart Road Monitoring Map</h1>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([32.03619239017797, 35.87200139587166], 17);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function getSeverity(confidence) {
        if (confidence >= 0.80) {
            return {
                level: "High Priority",
                color: "red",
                radius: 18
            };
        }

        if (confidence >= 0.60) {
            return {
                level: "Medium Priority",
                color: "orange",
                radius: 14
            };
        }

        return {
            level: "Low Priority",
            color: "green",
            radius: 10
        };
    }

    fetch("http://127.0.0.1:5000/potholes")
        .then(response => response.json())
        .then(data => {
            data.forEach(point => {
                const severity = getSeverity(point.confidence);

                L.circleMarker([point.latitude, point.longitude], {
                    radius: severity.radius,
                    color: severity.color,
                    fillColor: severity.color,
                    fillOpacity: 0.7
                })
                .addTo(map)
                .bindPopup(
                    "<b>Road Damage</b><br>" +
                    "Type: Pothole<br>" +
                    "Priority: " + severity.level + "<br>" +
                    "Confidence: " + point.confidence + "<br>" +
                    "Latitude: " + point.latitude + "<br>" +
                    "Longitude: " + point.longitude
                );
            });
        });
</script>

</body>
</html>
