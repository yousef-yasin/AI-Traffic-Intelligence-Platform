<!DOCTYPE html>
<html>
<head>
    <title>JRIP Road Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        h1 {
            padding: 15px;
            margin: 0;
            background: #111827;
            color: white;
        }

        #map {
            height: 90vh;
            width: 100%;
        }
    </style>
</head>

<body>

<h1>JRIP Smart Road Monitoring Map</h1>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([32.03619239017797, 35.87200139587166], 17);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    fetch("http://127.0.0.1:5000/potholes")
        .then(response => response.json())
        .then(data => {
            console.log(data);

            data.forEach(point => {
                L.marker([point.latitude, point.longitude])
                    .addTo(map)
                    .bindPopup(
                        "Pothole<br>" +
                        "Confidence: " + point.confidence
                    );
            });
        });
</script>

</body>
</html>
